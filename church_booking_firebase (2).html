<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>신촌교회 예약 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --green: #1a7a5e;
  --green-light: #e8f5f0;
  --green-mid: #2ea87e;
  --green-dark: #0f5240;
  --red: #c0392b;
  --red-light: #fdecea;
  --blue: #1a5fa8;
  --blue-light: #e8f0fb;
  --gray0: #ffffff;
  --gray1: #f8f9fa;
  --gray2: #f1f3f5;
  --gray3: #e9ecef;
  --gray4: #dee2e6;
  --gray5: #adb5bd;
  --gray6: #6c757d;
  --gray7: #495057;
  --gray8: #343a40;
  --gray9: #212529;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --radius-xl: 24px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: #f0f4f2; color: var(--gray9); min-height: 100vh; }

.site-header {
  background: var(--green-dark);
  color: white;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.logo { font-family: 'DM Serif Display', serif; font-size: 20px; display: flex; align-items: center; gap: 10px; }
.header-date { font-size: 13px; opacity: .7; font-weight: 300; }

.container { max-width: 780px; margin: 0 auto; padding: 28px 16px 60px; }

.tabs { display: flex; background: var(--gray0); border-radius: var(--radius-xl); padding: 5px; margin-bottom: 24px; box-shadow: var(--shadow-sm); border: 1px solid var(--gray3); }
.tab { flex: 1; padding: 10px 0; border: none; background: none; border-radius: var(--radius-lg); font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 500; color: var(--gray6); cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
.tab.on { background: var(--green); color: white; box-shadow: var(--shadow-sm); }

.pane { display: none; }
.pane.on { display: block; }

.step-bar { display: flex; align-items: center; background: var(--gray0); border-radius: var(--radius-lg); padding: 14px 20px; margin-bottom: 20px; box-shadow: var(--shadow-sm); border: 1px solid var(--gray3); }
.stp { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--gray5); flex: 1; }
.stp.on { color: var(--green); font-weight: 500; }
.stp.done { color: var(--gray7); }
.snum { width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid currentColor; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.stp.done .snum { background: var(--green); border-color: var(--green); color: white; }
.sarr { color: var(--gray4); margin: 0 8px; font-size: 16px; }

.card { background: var(--gray0); border-radius: var(--radius-lg); border: 1px solid var(--gray3); box-shadow: var(--shadow-sm); padding: 20px; margin-bottom: 16px; }
.sec-label { font-size: 13px; font-weight: 500; color: var(--gray6); margin-bottom: 10px; }
.sec-label span { font-weight: 400; color: var(--gray5); }

.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.cal-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--gray9); }
.cnav { width: 34px; height: 34px; border-radius: var(--radius-md); border: 1px solid var(--gray3); background: var(--gray0); cursor: pointer; color: var(--gray7); display: flex; align-items: center; justify-content: center; transition: all .15s; font-size: 16px; }
.cnav:hover { background: var(--gray2); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cdow { text-align: center; font-size: 12px; color: var(--gray5); font-weight: 500; padding: 4px 0 8px; }
.cdow.sun { color: var(--red); }
.cday { text-align: center; padding: 8px 2px; cursor: pointer; border-radius: var(--radius-md); font-size: 13px; color: var(--gray8); display: flex; flex-direction: column; align-items: center; gap: 3px; min-height: 42px; justify-content: center; transition: background .12s; }
.cday:hover:not(.past):not(.mt) { background: var(--green-light); }
.cday.past { color: var(--gray4); cursor: default; }
.cday.mt { cursor: default; }
.cday.tod { font-weight: 700; color: var(--green); }
.cday.sel { background: var(--green) !important; color: white !important; font-weight: 700; }
.cday.sunday:not(.past) { color: var(--red); }
.cal-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--green-mid); }
.cday.sel .cal-dot { background: rgba(255,255,255,.6); }
.day-pill { font-size: 9px; padding: 1px 4px; border-radius: 3px; line-height: 1.4; }
.pill-sun { background: var(--red-light); color: var(--red); }

.grp-label { font-size: 11px; font-weight: 700; color: var(--gray5); letter-spacing: .8px; text-transform: uppercase; margin: 14px 0 8px; }
.items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; margin-bottom: 4px; }
.icard { background: var(--gray0); border: 1px solid var(--gray3); border-radius: var(--radius-md); padding: 12px 8px; text-align: center; cursor: pointer; transition: all .15s; }
.icard:hover:not(.full) { border-color: var(--green-mid); background: var(--green-light); }
.icard.sel { border: 2px solid var(--green); background: var(--green-light); }
.icard.full { opacity: .4; cursor: not-allowed; }
.icard-name { font-size: 13px; font-weight: 500; color: var(--gray9); }
.icard-tag { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 4px; margin-top: 4px; }
.tag-ok { background: var(--green-light); color: var(--green); }
.tag-full { background: var(--gray2); color: var(--gray5); }
.tag-car { background: var(--blue-light); color: var(--blue); }

.time-section { margin-bottom: 16px; }
.time-row-label { font-size: 12px; font-weight: 500; color: var(--gray6); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.time-row-label .dot-start { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; }
.time-row-label .dot-end { width: 8px; height: 8px; border-radius: 50%; background: #e67e22; display: inline-block; }
.time-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; max-height: 220px; overflow-y: auto; margin-bottom: 8px; }
.tbtn { padding: 9px 4px; border-radius: var(--radius-sm); border: 1px solid var(--gray3); background: var(--gray0); font-family: 'Noto Sans KR', sans-serif; font-size: 12px; cursor: pointer; color: var(--gray7); text-align: center; transition: all .12s; }
.tbtn:hover:not(.bkd):not(.in-range) { border-color: var(--green-mid); color: var(--green); background: var(--green-light); }
.tbtn.sel-start { background: var(--green); color: white; border-color: var(--green); font-weight: 500; }
.tbtn.sel-end { background: #e67e22; color: white; border-color: #e67e22; font-weight: 500; }
.tbtn.in-range { background: var(--green-light); color: var(--green-dark); border-color: #b2dfce; }
.tbtn.bkd { background: var(--gray2); color: var(--gray4); cursor: not-allowed; text-decoration: line-through; }
.tbtn.bkd-range { background: #fdecea; color: #e74c3c; border-color: #f5c6c2; cursor: not-allowed; font-size: 10px; }
.time-range-display { background: var(--green-light); border: 1px solid #b2dfce; border-radius: var(--radius-md); padding: 10px 14px; margin-bottom: 12px; font-size: 13px; color: var(--green-dark); display: flex; align-items: center; gap: 8px; }
.time-range-display .arrow { color: var(--green); font-weight: 700; }

.fg { margin-bottom: 12px; }
.fg label { display: block; font-size: 13px; color: var(--gray6); margin-bottom: 5px; font-weight: 500; }
.fg input { width: 100%; padding: 10px 14px; border-radius: var(--radius-md); border: 1px solid var(--gray3); font-family: 'Noto Sans KR', sans-serif; font-size: 14px; color: var(--gray9); background: var(--gray1); transition: border-color .15s; outline: none; }
.fg input:focus { border-color: var(--green-mid); background: white; }

.sumbox { background: var(--green-light); border: 1px solid #b2dfce; border-radius: var(--radius-md); padding: 14px 16px; margin-bottom: 14px; font-size: 13px; color: var(--green-dark); line-height: 2; }
.sumbox strong { font-weight: 700; }

.btn-confirm { width: 100%; padding: 13px; border-radius: var(--radius-md); background: var(--green); color: white; border: none; font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: background .15s; }
.btn-confirm:hover:not(:disabled) { background: var(--green-dark); }
.btn-confirm:disabled { background: var(--gray3); color: var(--gray5); cursor: not-allowed; }
.btn-back { background: none; border: none; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: var(--gray6); cursor: pointer; display: flex; align-items: center; gap: 5px; padding: 0 0 14px; }
.btn-back:hover { color: var(--gray9); }

.notice { font-size: 12px; padding: 8px 12px; border-radius: var(--radius-sm); margin-bottom: 12px; }
.notice-sun { background: var(--red-light); color: var(--red); border: 1px solid #f5c6c2; }
.notice-week { background: var(--green-light); color: var(--green-dark); border: 1px solid #b2dfce; }

.filter-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.fbtn { padding: 6px 16px; border-radius: 20px; border: 1px solid var(--gray3); background: var(--gray0); font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: var(--gray6); cursor: pointer; transition: all .15s; }
.fbtn.on { background: var(--green); color: white; border-color: var(--green); font-weight: 500; }

.list-item { background: var(--gray0); border: 1px solid var(--gray3); border-radius: var(--radius-lg); padding: 14px 18px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; gap: 10px; box-shadow: var(--shadow-sm); }
.li-main { font-size: 14px; font-weight: 500; color: var(--gray9); margin-bottom: 3px; }
.li-sub { font-size: 12px; color: var(--gray5); }
.btn-del { flex-shrink: 0; background: none; border: 1px solid var(--gray3); border-radius: var(--radius-sm); padding: 5px 10px; font-family: 'Noto Sans KR', sans-serif; font-size: 12px; color: var(--gray6); cursor: pointer; transition: all .15s; white-space: nowrap; }
.btn-del:hover { border-color: var(--red); color: var(--red); background: var(--red-light); }
.empty-state { text-align: center; padding: 48px 0; color: var(--gray5); font-size: 14px; }

.type-badge { font-size: 11px; padding: 2px 7px; border-radius: 4px; font-weight: 500; }
.tb-room { background: var(--green-light); color: var(--green-dark); }
.tb-car { background: var(--blue-light); color: var(--blue); }

/* 로딩 */
.loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; gap: 14px; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--gray3); border-top-color: var(--green); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--gray6); }

.toast-wrap { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); z-index: 9999; pointer-events: none; }
.toast { background: var(--gray9); color: white; padding: 11px 22px; border-radius: 24px; font-size: 14px; opacity: 0; transform: translateY(8px); transition: opacity .25s, transform .25s; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateY(0); }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--gray3); border-radius: 4px; }
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">데이터를 불러오는 중...</div>
</div>

<header class="site-header">
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 22V10l9-7 9 7v12"/>
      <path d="M12 3v4M9 13h6M12 13v6"/>
    </svg>
    신촌교회 예약 시스템
  </div>
  <span class="header-date" id="header-date"></span>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab on" onclick="switchTab('book')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      예약하기
    </button>
    <button class="tab" onclick="switchTab('list')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      예약 현황
    </button>
  </div>

  <div id="pane-book" class="pane on">
    <div class="step-bar" id="stepbar"></div>

    <div id="s1">
      <div class="card">
        <div class="cal-header">
          <button class="cnav" onclick="chMon(-1)">&#8249;</button>
          <span class="cal-title" id="cal-title"></span>
          <button class="cnav" onclick="chMon(1)">&#8250;</button>
        </div>
        <div class="cal-grid" id="cgrid"></div>
      </div>
    </div>

    <div id="s2" style="display:none">
      <button class="btn-back" onclick="goStep(1)">← 날짜 다시 선택</button>
      <div class="card">
        <div class="sec-label">항목 선택 <span id="lbl-date"></span></div>
        <div id="notice2"></div>
        <div id="items-wrap"></div>
      </div>
    </div>

    <div id="s3" style="display:none">
      <button class="btn-back" onclick="goStep(2)">← 항목 다시 선택</button>
      <div class="card">
        <div class="sec-label">시간 선택 <span id="lbl-item"></span></div>
        <div id="time-hint" class="time-row-label" style="margin-bottom:8px"><span class="dot-start"></span> 시작 시간을 먼저 선택하세요</div>
        <div class="time-grid" id="tgrid"></div>
        <div id="time-range-display" style="display:none" class="time-range-display"></div>
        <div class="sec-label" style="margin-top:4px">예약자 정보</div>
        <div class="fg"><label>이름</label><input id="iname" type="text" placeholder="홍길동"></div>
        <div class="fg"><label>목적 / 행선지</label><input id="ipurpose" type="text" placeholder="예: 심방, 청년부 모임"></div>
        <div class="sumbox" id="sumbox" style="display:none"></div>
        <button class="btn-confirm" id="cfmbtn" disabled onclick="doBook()">예약 확정</button>
      </div>
    </div>
  </div>

  <div id="pane-list" class="pane">
    <div class="filter-row">
      <button class="fbtn on" onclick="setFilter('all')">전체</button>
      <button class="fbtn" onclick="setFilter('room')">방 예약</button>
      <button class="fbtn" onclick="setFilter('car')">차량 예약</button>
    </div>
    <div id="bklist"></div>
  </div>
</div>

<div class="toast-wrap"><div class="toast" id="toast"></div></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCevQnEL6OKsBMzdZH4vjqgiUc2Hmp5omY",
  authDomain: "shinchon-church-booking.firebaseapp.com",
  projectId: "shinchon-church-booking",
  storageBucket: "shinchon-church-booking.firebasestorage.app",
  messagingSenderId: "117993103378",
  appId: "1:117993103378:web:32635831525908af13b8cb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ROOMS=[
  {id:'r1',name:'1번방',grp:'번호방',type:'room'},
  {id:'r2',name:'2번방',grp:'번호방',type:'room'},
  {id:'r34',name:'3·4번방',grp:'번호방',type:'room'},
  {id:'r5',name:'5번방',grp:'번호방',type:'room'},
  {id:'r6',name:'6번방',grp:'번호방',type:'room'},
  {id:'r7',name:'7번방',grp:'번호방',type:'room'},
  {id:'r8',name:'8번방',grp:'번호방',type:'room'},
  {id:'r9',name:'9번방',grp:'번호방',type:'room'},
  {id:'r10',name:'10번방',grp:'번호방',type:'room'},
  {id:'r11',name:'11번방',grp:'번호방',type:'room'},
  {id:'r12',name:'12번방',grp:'번호방',type:'room'},
  {id:'r13',name:'13번방',grp:'번호방',type:'room'},
  {id:'r14',name:'14번방',grp:'번호방',type:'room'},
  {id:'da1',name:'다움1',grp:'다움·채움',type:'room'},
  {id:'da2',name:'다움2',grp:'다움·채움',type:'room'},
  {id:'ch1',name:'채움1',grp:'다움·채움',type:'room'},
  {id:'ch2',name:'채움2',grp:'다움·채움',type:'room'},
  {id:'ch3',name:'채움3',grp:'다움·채움',type:'room'},
];
const CARS=[
  {id:'st1',name:'스타렉스 1',grp:'차량',type:'car'},
  {id:'st2',name:'스타렉스 2',grp:'차량',type:'car'},
  {id:'st3',name:'스타렉스 3',grp:'차량',type:'car'},
];
const ALL_ITEMS=[...ROOMS,...CARS];

function genTimes(){
  const t=[];
  for(let h=6;h<22;h++){
    t.push(String(h).padStart(2,'0')+':00');
    t.push(String(h).padStart(2,'0')+':30');
  }
  t.push('22:00');
  return t;
}
const TIMES=genTimes();
const DOW=['일','월','화','수','목','금','토'];
const MNAMES=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const WD=['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];

const today=new Date();
let cy=today.getFullYear(), cm=today.getMonth();
let selD=null, selItem=null, selStart=null, selEnd=null, step=1, listFilter='all';
let bks=[];

document.getElementById('header-date').textContent=
  today.getFullYear()+'년 '+(today.getMonth()+1)+'월 '+today.getDate()+'일 '+WD[today.getDay()];

function fd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fdDisp(s){const d=new Date(s+'T00:00:00');return (d.getMonth()+1)+'월 '+d.getDate()+'일 ('+DOW[d.getDay()]+')';}
function isSunday(ds){return new Date(ds+'T00:00:00').getDay()===0;}

// Firestore 실시간 리스닝
const q = query(collection(db, 'bookings'), orderBy('createdAt', 'desc'));
onSnapshot(q, (snapshot) => {
  bks = snapshot.docs.map(d => ({...d.data(), docId: d.id}));
  drawCal();
  if(document.getElementById('pane-list').classList.contains('on')) drawList();
  if(step===2) drawItems();
  if(step===3) drawTimes();
  document.getElementById('loading').style.display='none';
});

function renderSteps(){
  const labs=['날짜 선택','항목 선택','시간 선택'];
  document.getElementById('stepbar').innerHTML=labs.map((l,i)=>{
    const n=i+1;
    const cls=n<step?'stp done':n===step?'stp on':'stp';
    const num=n<step?'✓':n;
    return (i?'<span class="sarr">›</span>':'')+
      '<div class="'+cls+'"><span class="snum">'+num+'</span>'+l+'</div>';
  }).join('');
}

function chMon(d){cm+=d;if(cm>11){cm=0;cy++;}if(cm<0){cm=11;cy--;}drawCal();}

function drawCal(){
  document.getElementById('cal-title').textContent=cy+'년 '+MNAMES[cm];
  const todStr=fd(today);
  const first=new Date(cy,cm,1).getDay();
  const total=new Date(cy,cm+1,0).getDate();
  let h=DOW.map((d,i)=>'<div class="cdow'+(i===0?' sun':'')+'">'+(i===0?'주일':d)+'</div>').join('');
  for(let i=0;i<first;i++) h+='<div class="cday mt"></div>';
  for(let d=1;d<=total;d++){
    const dt=new Date(cy,cm,d);
    const ds=fd(dt);
    const todMid=new Date(today.getFullYear(),today.getMonth(),today.getDate());
    const isPast=dt<todMid;
    const isSun=dt.getDay()===0;
    const isTod=ds===todStr;
    const isSel=ds===selD;
    const hasBk=bks.some(b=>b.date===ds);
    let cls='cday';
    if(isPast) cls+=' past';
    else if(isSel) cls+=' sel';
    else if(isTod) cls+=' tod';
    if(isSun&&!isPast) cls+=' sunday';
    const dot=hasBk&&!isPast?'<div class="cal-dot"></div>':'';
    const pill=!isPast&&!isSel&&isSun?'<span class="day-pill pill-sun">주일</span>':'';
    const click=isPast?'':'onclick="pickDate(\''+ds+'\')"';
    h+='<div class="'+cls+'" '+click+'>'+d+dot+pill+'</div>';
  }
  document.getElementById('cgrid').innerHTML=h;
}

window.pickDate=function(ds){selD=ds;selItem=null;selStart=null;selEnd=null;drawCal();goStep(2);}

function goStep(n){
  step=n;
  document.getElementById('s1').style.display=n===1?'block':'none';
  document.getElementById('s2').style.display=n===2?'block':'none';
  document.getElementById('s3').style.display=n===3?'block':'none';
  if(n===2) drawItems();
  if(n===3) drawTimes();
  renderSteps();
  window.scrollTo({top:0,behavior:'smooth'});
}
window.goStep=goStep;

function drawItems(){
  document.getElementById('lbl-date').textContent=selD?'— '+fdDisp(selD):'';
  const sun=isSunday(selD);
  document.getElementById('notice2').innerHTML=sun
    ?'<div class="notice notice-sun">🚗 주일에는 차량 예약만 가능합니다</div>'
    :'<div class="notice notice-week">✅ 방 예약과 차량 예약 모두 가능합니다</div>';
  const items=sun?CARS:ALL_ITEMS;
  const grps={};
  items.forEach(r=>{if(!grps[r.grp])grps[r.grp]=[];grps[r.grp].push(r);});
  let h='';
  for(const[g,rs]of Object.entries(grps)){
    h+='<div class="grp-label">'+g+'</div><div class="items-grid">';
    h+=rs.map(r=>{
      const full=TIMES.every(t=>bks.some(b=>b.itemId===r.id&&b.date===selD&&b.time===t));
      const isSel=selItem===r.id;
      const tag=full?'<span class="icard-tag tag-full">마감</span>':r.type==='car'?'<span class="icard-tag tag-car">차량</span>':'<span class="icard-tag tag-ok">예약 가능</span>';
      return '<div class="icard'+(isSel?' sel':'')+(full?' full':'')+'" '+(full?'':' onclick="pickItem(\''+r.id+'\')"')+'>'
        +'<div class="icard-name">'+r.name+'</div>'+tag+'</div>';
    }).join('');
    h+='</div>';
  }
  document.getElementById('items-wrap').innerHTML=h;
}

window.pickItem=function(id){selItem=id;selStart=null;selEnd=null;goStep(3);}

function isSlotBooked(t){
  return bks.some(b=>{
    if(b.itemId!==selItem||b.date!==selD) return false;
    return t>=b.timeStart && t<b.timeEnd;
  });
}
function hasBookingInRange(s,e){
  return TIMES.some(t=>t>=s&&t<e&&isSlotBooked(t));
}
function drawTimes(){
  const item=ALL_ITEMS.find(x=>x.id===selItem);
  document.getElementById('lbl-item').textContent=item?'— '+item.name:'';
  const hint=document.getElementById('time-hint');
  if(!selStart){
    hint.innerHTML='<span class="dot-start"></span> 시작 시간을 선택하세요';
  } else if(!selEnd){
    hint.innerHTML='<span class="dot-end"></span> 끝 시간을 선택하세요 (시작: <strong>'+selStart+'</strong>)';
  } else {
    hint.innerHTML='<span class="dot-start"></span> 선택 완료: <strong>'+selStart+' ~ '+selEnd+'</strong>';
  }
  const rd=document.getElementById('time-range-display');
  if(selStart&&selEnd){
    rd.style.display='flex';
    rd.innerHTML='<strong>'+selStart+'</strong><span class="arrow"> → </span><strong>'+selEnd+'</strong>&nbsp;&nbsp;('+calcDur(selStart,selEnd)+')';
  } else { rd.style.display='none'; }
  document.getElementById('tgrid').innerHTML=TIMES.map(t=>{
    const booked=isSlotBooked(t);
    let cls='', dis=false;
    if(booked){ cls='bkd'; dis=true; }
    else if(selStart&&selEnd&&t>=selStart&&t<selEnd){ cls=t===selStart?'sel-start':'in-range'; }
    else if(t===selStart){ cls='sel-start'; }
    else if(selStart&&!selEnd&&t<=selStart){ dis=true; }
    return '<button class="tbtn '+cls+'" '+(dis?'disabled':' onclick="pickTime(\''+t+'\')"')+'>'+t+'</button>';
  }).join('');
  updateSum();
}
function calcDur(s,e){
  const [sh,sm]=s.split(':').map(Number);
  const [eh,em]=e.split(':').map(Number);
  const mins=(eh*60+em)-(sh*60+sm);
  const h=Math.floor(mins/60),m=mins%60;
  return h>0?(m>0?h+'시간 '+m+'분':h+'시간'):m+'분';
}
window.pickTime=function(t){
  if(!selStart||( selStart&&selEnd)){
    selStart=t;selEnd=null;
  } else {
    if(t<=selStart){selStart=t;selEnd=null;}
    else{
      if(hasBookingInRange(selStart,t)){showToast('선택 범위 안에 이미 예약된 시간이 있습니다');return;}
      selEnd=t;
    }
  }
  drawTimes();updateSum();
}

function updateSum(){
  const box=document.getElementById('sumbox');
  const btn=document.getElementById('cfmbtn');
  if(selD&&selItem&&selStart&&selEnd){
    const item=ALL_ITEMS.find(x=>x.id===selItem);
    box.style.display='block';
    box.innerHTML='<strong>'+fdDisp(selD)+'</strong><br><strong>'+item.name+'</strong> · <strong>'+selStart+' ~ '+selEnd+'</strong> ('+calcDur(selStart,selEnd)+')<br>이름과 목적을 입력 후 확정하세요.';
    btn.disabled=false;
  } else {
    box.style.display='none';
    btn.disabled=true;
  }
}

window.doBook=async function(){
  const name=document.getElementById('iname').value.trim();
  const purpose=document.getElementById('ipurpose').value.trim();
  if(!name){showToast('이름을 입력해 주세요');return;}
  if(hasBookingInRange(selStart,selEnd)){showToast('이미 예약된 시간이 포함되어 있습니다');return;}
  const item=ALL_ITEMS.find(x=>x.id===selItem);
  try {
    await addDoc(collection(db,'bookings'),{
      itemId:selItem, itemName:item.name, itemType:item.type,
      date:selD, timeStart:selStart, timeEnd:selEnd, name, purpose,
      createdAt: new Date().toISOString()
    });
    showToast('예약이 완료되었습니다! 🎉');
    document.getElementById('iname').value='';
    document.getElementById('ipurpose').value='';
    selD=null;selItem=null;selStart=null;selEnd=null;
    goStep(1);
  } catch(e) {
    showToast('오류가 발생했습니다. 다시 시도해 주세요.');
  }
}

window.setFilter=function(f){
  listFilter=f;
  document.querySelectorAll('.fbtn').forEach((el,i)=>el.classList.toggle('on',['all','room','car'][i]===f));
  drawList();
}

function drawList(){
  const el=document.getElementById('bklist');
  let filtered=listFilter==='room'?bks.filter(b=>b.itemType==='room'):listFilter==='car'?bks.filter(b=>b.itemType==='car'):bks;
  if(!filtered.length){
    el.innerHTML='<div class="empty-state">📭 예약 내역이 없습니다</div>';
    return;
  }
  const sorted=[...filtered].sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  el.innerHTML=sorted.map(b=>{
    const badge='<span class="type-badge '+(b.itemType==='car'?'tb-car':'tb-room')+'">'+(b.itemType==='car'?'차량':'방')+'</span>';
    return '<div class="list-item">'
      +'<div><div class="li-main">'+b.itemName+' · '+b.time+' '+badge+'</div>'
      +'<div class="li-sub">'+fdDisp(b.date)+' · '+b.name+(b.purpose?' — '+b.purpose:'')+'</div></div>'
      +'<button class="btn-del" onclick="delBk(\''+b.docId+'\')">취소</button>'
      +'</div>';
  }).join('');
}

window.delBk=async function(docId){
  if(!confirm('예약을 취소하시겠습니까?')) return;
  try {
    await deleteDoc(doc(db,'bookings',docId));
    showToast('예약이 취소되었습니다');
  } catch(e) {
    showToast('오류가 발생했습니다');
  }
}

window.switchTab=function(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('on',['book','list'][i]===t));
  document.querySelectorAll('.pane').forEach(el=>el.classList.remove('on'));
  document.getElementById('pane-'+t).classList.add('on');
  if(t==='list') drawList();
}

function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2800);
}

renderSteps();
drawCal();
</script>
</body>
</html>
